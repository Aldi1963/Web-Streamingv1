limit_req_zone $binary_remote_addr zone=clipku_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=clipku_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=clipku_sensitive:10m rate=15r/m;
proxy_cache_path /var/cache/nginx/clipku_home levels=1:2 keys_zone=clipku_home:10m inactive=30m max_size=100m;

server {
    server_name drama.clipku.com;
    include snippets/security-headers.conf;
    client_max_body_size 1m;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;

    location ^~ /_next/static/ {
        alias /var/www/clipku-next-static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/api/auth/(login|register|forgot-password|reset-password)$ {
        limit_req zone=clipku_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }

    location ~ ^/api/(redeem-codes|payments/checkout|reseller/) {
        limit_req zone=clipku_sensitive burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }

    location /api/ {
        limit_req zone=clipku_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }

    location = / {
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
        proxy_cache clipku_home;
        proxy_cache_valid 200 5m;
        proxy_cache_bypass $cookie_clipku_session;
        proxy_no_cache $cookie_clipku_session $upstream_http_set_cookie;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache $upstream_cache_status always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        include proxy_params;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/drama.clipku.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drama.clipku.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name drama.clipku.com;
    return 301 https://$host$request_uri;
}
